# Appium server URL
appium.server.url=http://127.0.0.1:4723

# true = Android (UiAutomator2), false = iOS (XCUITest)
platform.android=false

# Android target device/emulator
android.deviceName=Pixel_4_XL_API_31
android.platformVersion=

# iOS target simulator
ios.deviceName=iPhone 16
ios.platformVersion=

# Absolute or relative path to your prepared Flutter app artifacts
app.android.path=src/test/resources/apk/app-debug.apk
app.ios.path=src/test/resources/ipa/ios-test-app.app
